<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Wiertara</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        background-image: url("https://images.pexels.com/photos/316093/pexels-photo-316093.jpeg?auto=compress&cs=tinysrgb&w=1600");
        background-size: cover;
        background-position: center;
        overflow: hidden;
        font-family: "Segoe UI", sans-serif;
        color: #fff;
    }

    .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.55);
        z-index: -1;
    }

    .card {
        width: 360px;
        background: #1e1f22;
        border-radius: 16px;
        border: 1px solid #2b2d31;
        box-shadow: 0 0 40px rgba(0,0,0,0.8);
        overflow: hidden;
        position: relative;
        padding-bottom: 20px;
    }

    .banner {
        height: 130px;
        background-image: url("https://i.pinimg.com/736x/f7/d6/06/f7d606f68e822fd02be6551bd9428fbd.jpg");
        background-size: cover;
        background-position: center;
        position: relative;
    }

    
    .discord-logo {
        position: absolute;
        left: 50%;
        bottom: -36px;
        transform: translateX(-50%);
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: #111827;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 0 4px #111827, 0 0 0 7px rgba(15,23,42,0.9);
        cursor: pointer;
        animation: bounce 2s infinite ease-in-out;
    }

    @keyframes bounce {
        0%, 100% { transform: translateX(-50%) translateY(0); }
        50% { transform: translateX(-50%) translateY(-12px); }
    }

    .discord-logo img {
        width: 48px;
        height: 48px;
        border-radius: 50%;
    }

    .content {
        padding: 60px 16px 10px;
    }

    .avatar {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        margin: 0 auto;
        background-image: url("https://i.pinimg.com/originals/bb/d4/15/bbd415eab823d2f925041014974397fd.gif");
        background-size: cover;
        background-position: center;
        box-shadow: 0 0 0 4px #111827, 0 0 0 7px rgba(148,163,184,0.6);
        animation: avatarFloat 4s infinite ease-in-out;
    }

    @keyframes avatarFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
    }

    .name {
        text-align: center;
        margin-top: 10px;
        font-size: 22px;
        font-weight: 700;
    }

    
    .side-logo-row {
        margin-top: 8px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .side-logo {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background-image: url("https://i.pinimg.com/736x/13/28/22/132822bd6a4c3db5c9860372a683c00a.jpg");
        background-size: cover;
        background-position: center;
        animation: tigerMove 2.4s infinite ease-in-out;
    }

    @keyframes tigerMove {
        0% { transform: translateX(-10px); }
        50% { transform: translateX(10px); }
        100% { transform: translateX(-10px); }
    }

    .badges {
        margin-top: 8px;
        display: flex;
        justify-content: center;
        gap: 6px;
    }

    .badge-dev {
        background: #111827;
        border: 1px solid #4ade80;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        display: flex;
        align-items: center;
        gap: 4px;
        color: #bbf7d0;
    }

    .badge-dot {
        width: 8px;
        height: 8px;
        background: #4ade80;
        border-radius: 50%;
        box-shadow: 0 0 10px #4ade80;
    }

    .badge-emoji {
        width: 22px;
        height: 22px;
        background: #111827;
        border-radius: 50%;
        border: 1px solid #3f3f46;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
    }

    .status {
        margin-top: 14px;
        background: #2b2d31;
        padding: 10px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
    }

    .status-dot {
        width: 10px;
        height: 10px;
        background: #22c55e;
        border-radius: 50%;
        box-shadow: 0 0 10px #22c55e;
    }

    .section-title {
        margin-top: 16px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: #a1a1aa;
    }

    .activity {
        margin-top: 8px;
        background: #2b2d31;
        padding: 10px;
        border-radius: 8px;
        font-size: 13px;
    }

    .activity-top {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .activity-icon {
        width: 24px;
        height: 24px;
        border-radius: 4px;
        background: #0f172a;
        overflow: hidden;
    }

    .activity-icon img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .activity-sub {
        margin-top: 4px;
        font-size: 12px;
        color: #a1a1aa;
    }
</style>
</head>
<body>

<div class="overlay"></div>

<div class="card">

    <div class="banner"></div>

    
    <a class="discord-logo" href="https://discord.gg/zufvJmwk" target="_blank">
        <img src="https://i.pinimg.com/736x/b5/d4/ce/b5d4ce10a744861ffd3314d20d116976.jpg">
    </a>

    <div class="content">

        <div class="avatar"></div>

        <div class="name">szefitek.dev</div>

        
        <div class="side-logo-row">
            <div class="side-logo"></div>
        </div>

        <div class="badges">
            <div class="badge-dev"><div class="badge-dot"></div>Verified Developer</div>
            <div class="badge-emoji">❤️</div>
            <div class="badge-emoji">🔥</div>
        </div>

        <div class="status">
            <div class="status-dot"></div>
            <div>Wiertara</div>
        </div>

        <div class="section-title">Playing a game</div>

        <div class="activity">
            <div class="activity-top">
                <div class="activity-icon">
                    <img src="https://i.pinimg.com/1200x/01/e6/21/01e621158668a4b8b7c92f1d1671bd43.jpg">
                </div>
                <div>Visual Studio Code</div>
            </div>
            <div class="activity-sub">szefitek.dev — Editing index.html</div>
        </div>

    </div>
</div>

<audio id="music" src="muzyka.mp3" loop></audio>

<script>
    const audio = document.getElementById("music");

    audio.play().catch(() => {
        const startMusic = () => {
            audio.play().catch(() => {});
            document.removeEventListener("click", startMusic);
        };
        document.addEventListener("click", startMusic);
    });
</script>


</body>
</html>
