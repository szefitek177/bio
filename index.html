<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>szefitek.dev — Wiertara</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        background-image: url("https://images.pexels.com/photos/316093/pexels-photo-316093.jpeg?auto=compress&cs=tinysrgb&w=1600");
        background-size: cover;
        background-position: center;
        overflow: hidden;
        font-family: "Segoe UI", sans-serif;
        color: #fff;
    }

    .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.55);
        z-index: -1;
    }

    .card {
        width: 380px;
        background: #1e1f22;
        border-radius: 18px;
        border: 1px solid #2b2d31;
        box-shadow: 0 0 40px rgba(0,0,0,0.8);
        overflow: hidden;
        position: relative;
        padding-bottom: 20px;
        animation: fadeIn 1s ease;
        transition: 0.2s;
    }

    .card:hover {
        border-color: #4ade80;
        box-shadow: 0 0 50px rgba(74,222,128,0.35);
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
    }

    .banner {
        height: 150px;
        background-image: url("https://i.pinimg.com/736x/f7/d6/06/f7d606f68e822fd02be6551bd9428fbd.jpg");
        background-size: cover;
        background-position: center;
    }

    .content {
        padding: 20px 16px 10px;
    }

    .avatar {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        margin: -60px auto 0 auto;
        background-image: url("https://i.pinimg.com/originals/bb/d4/15/bbd415eab823d2f925041014974397fd.gif");
        background-size: cover;
        background-position: center;
        box-shadow: 0 0 0 4px #111827, 0 0 0 7px rgba(148,163,184,0.6);
        animation: avatarFloat 4s infinite ease-in-out;
    }

    @keyframes avatarFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
    }

    .name-row {
        margin-top: 12px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
    }

    .name {
        font-size: 24px;
        font-weight: 700;
    }

    .icon-small {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background-size: cover;
        background-position: center;
        background-image: url("https://i.pinimg.com/736x/85/e9/d7/85e9d74f125bb82aa4be2478ce02bbd4.jpg");
    }

    .status {
        margin-top: 16px;
        background: #2b2d31;
        padding: 10px;
        border-radius: 10px;
        text-align: center;
        font-size: 15px;
        border: 1px solid #3a3b3f;
        transition: 0.2s;
    }

    .status:hover {
        background: #3a3b3f;
    }

    .links {
        margin-top: 18px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 0 20px;
    }

    .link-btn {
        background: #2b2d31;
        padding: 12px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
        color: #fff;
        font-size: 15px;
        transition: 0.2s;
        border: 1px solid #3a3b3f;
    }

    .link-btn:hover {
        background: #3a3b3f;
        transform: translateY(-2px);
    }

    .link-btn img {
        width: 28px;
        height: 28px;
        border-radius: 50%;
    }

    .section-title {
        margin-top: 18px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: #a1a1aa;
        text-align: center;
    }

    .activity {
        margin-top: 8px;
        background: #2b2d31;
        padding: 10px;
        border-radius: 10px;
        font-size: 13px;
        border: 1px solid #3a3b3f;
        transition: 0.2s;
        margin-inline: 20px;
    }

    .activity:hover {
        background: #3a3b3f;
    }

    .activity-top {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .activity-icon {
        width: 24px;
        height: 24px;
        border-radius: 4px;
        overflow: hidden;
    }

    .activity-icon img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .activity-sub {
        margin-top: 4px;
        font-size: 12px;
        color: #a1a1aa;
    }
</style>
</head>
<body>

<div class="overlay"></div>

<div class="card">

    <div class="banner"></div>

    <div class="content">

        <div class="avatar"></div>

        <div class="name-row">
            <div class="icon-small"></div>
            <div class="name">szefitek.dev</div>
        </div>

        <div class="status">Wiertara</div>

        <div class="links">

            <a class="link-btn" href="https://discord.gg/zufvJmwk" target="_blank">
                <img src="https://i.pinimg.com/736x/85/e9/d7/85e9d74f125bb82aa4be2478ce02bbd4.jpg">
                Discord
            </a>

            <a class="link-btn" href="https://github.com/szefitek177/bio" target="_blank">
                <img src="https://i.pinimg.com/736x/66/71/3a/66713a96b9b21dffd3a85a5d748a3171.jpg">
                GitHub
            </a>

            <a class="link-btn" href="https://www.tiktok.com/@totalszef" target="_blank">
                <img src="https://i.pinimg.com/736x/e4/15/d6/e415d6bd27900cc066d0b8b23a7f1055.jpg">
                TikTok
            </a>

        </div>

        <div class="section-title">Playing a game</div>

        <div class="activity">
            <div class="activity-top">
                <div class="activity-icon">
                    <img src="https://i.pinimg.com/1200x/01/e6/21/01e621158668a4b8b7c92f1d1671bd43.jpg">
                </div>
                <div>Visual Studio Code</div>
            </div>
            <div class="activity-sub">szefitek.dev — Editing index.html</div>
        </div>

    </div>
</div>


<audio id="music" src="muzyka.mp3" autoplay loop></audio>

<script>
    const audio = document.getElementById("music");
    audio.volume = 0.18; 

    audio.play().catch(() => {
        const startMusic = () => {
            audio.play().catch(() => {});
            document.removeEventListener("click", startMusic);
        };
        document.addEventListener("click", startMusic);
    });
</script>

</body>
</html>
